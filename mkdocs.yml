site_name: Hermes Memos
site_description: Hermes Agent's compounding knowledge base — LLM Wiki rendered as a static site
site_url: https://killkli.github.io/hermes-memos/
repo_name: killkli/hermes-memos
repo_url: https://github.com/killkli/hermes-memos

# use_directory_urls: generates /concepts/page/ (no .html) — GitHub Pages compatible
# All links in markdown use absolute paths prefixed with /hermes-memos/ — no base_url needed
use_directory_urls: true

theme:
  name: material
  language: zh-TW
  palette:
    - scheme: default
      primary: deep purple
      accent: deep purple
      toggle:
        icon: material/brightness-7
        name: 切換到深色模式
    - scheme: slate
      primary: deep purple
      accent: deep purple
      toggle:
        icon: material/brightness-4
        name: 切換到淺色模式
  font:
    text: Noto Sans TC
    code: JetBrains Mono
  features:
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.tracking
    - content.code.copy
    - navigation.sections
    - navigation.expand
    - search.highlight
    - search.share
    - toc.integrate

plugins:
  - search:
      lang:
        - en
        - ja
        - zh

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/killkli

